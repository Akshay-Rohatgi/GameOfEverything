parse_request_task:
  description: >
    Analyze the user's request: "{initial_prompt}" and break it down into context, initial access vectors, and post-exploitation goals.
  expected_output: >
    A structured object containing the parsed components of the request.
  agent: request_parser_agent

map_atoms_task:
  description: >
    You have been given a ParsedRequest as context from the previous task. It contains:
    - `initial_access_vectors`: a list of strings describing how the attacker gains initial access.
    - `post_exploitation_goals`: a list of strings describing what the attacker wants to achieve after gaining access.

    If you don't have a parsedRequest please run the tool called `search_vulnerability_atoms` with the query "NOT_WORKING" to get it before starting this task.

    YOUR INSTRUCTIONS (follow them in order):
    1. Read the ParsedRequest output from context. Identify every item in `initial_access_vectors` and `post_exploitation_goals`.
    2. For EACH item, call the `search_vulnerability_atoms` tool with a concise search query derived from that item.
       Example: if an access vector is "SMB share with anonymous access containing a sensitive file", call:
       Action: search_vulnerability_atoms
       Action Input: {"query": "insecure samba share anonymous access"}
    3. The tool may return MULTIPLE Atom results separated by "--- ATOM: <id> ---" headers.
       For each result, read the Atom markdown carefully:
       - Extract the Atom's `id` (the string after "--- ATOM:") and its `required_vars` from the frontmatter.
       - Evaluate how well it matches the user's specific requirement.
       Map ALL Atoms that are necessary to fully implement the requirement. A single requirement may
       need several complementary Atoms (e.g., "Samba share containing a backup file with credentials"
       needs both a `samba_insecure_share` atom AND a `sensitive_file` atom). However, only include
       an Atom if it is genuinely required — do not include loosely related ones.
       If none of the returned Atoms are a good fit, issue a more specific follow-up search query.
    4. Map the user's specific requirements to the selected Atom's parameters using its `required_vars`.
    5. Build a MappedRequest with:
       - `section`: a short label summarizing the overall scenario.
       - `mapped_initial_access_atoms`: list of MappedAtom objects for initial access.
       - `mapped_post_exploitation_goal_atoms`: list of MappedAtom objects for post-exploitation.

    Each MappedAtom must have:
    - `name`: the exact Atom id (e.g., "samba_insecure_share")
    - `context`: a brief explanation of why this Atom was chosen
    - `parameters`: a dict of key-value pairs matching the Atom's required_vars (e.g., {"share_name": "public", "path": "/srv/share"})
      For atoms whose `required_vars` is empty, use an empty JSON object: `"parameters": {}`
      CRITICAL: Do NOT write any text, comments, or backticks after the closing `}` of a parameters value.
              The entire MappedAtom object must be valid JSON. Annotations like
              `{}` followed by a backtick or newline will break parsing.

    IMPORTANT: You MUST call the search tool at least once. Do NOT skip the tool or guess Atom names.
  expected_output: >
    A structured MappedRequest JSON object with `section`, `mapped_initial_access_atoms`, and `mapped_post_exploitation_goal_atoms`.
    Each mapped atom must have `name` (the Atom id), `context` (why it was chosen), and `parameters` (a dict of config values).
  agent: mapping_agent

validate_mapping_task:
  description: >
    You are auditing the Mapping Agent's output. You have two pieces of context:
      1. The ParsedRequest (from parse_request_task) — your source of truth for
         what the user actually asked for.
      2. The MappedRequest (from map_atoms_task) — the mapper's output to audit.

    YOUR INSTRUCTIONS:

    STEP 1 — Extract the raw requirement strings.
    Read `initial_access_vectors` and `post_exploitation_goals` from the
    ParsedRequest. Note which list each string belongs to.

    STEP 2 — Independently atomize each requirement string.
    For each string, reason about what discrete atomic building blocks it implies.
    Break compound requirements into individual, specific descriptions.
    Example:
      "an exposed phpMyAdmin instance with authentication disabled containing a
       database with a user table of weak credentials usable for SSH login"
      → atomized descriptions:
          - "install phpMyAdmin web interface"
          - "phpMyAdmin authentication disabled or bypassed"
          - "database user table containing weak plaintext credentials"
          - "SSH user account with weak password"

    STEP 3 — Search for the best-matching Atom for each atomized description.
    For EACH atomized description, call:
      Action: search_vulnerability_atoms
      Action Input: {"query": "<atomized description>", "n_results": 1}
    Record the Atom `id` returned (the string after "--- ATOM:").

    STEP 4 — Diff against the existing MappedRequest.
    The MappedRequest output from the map_atoms_task is available in your context
    (injected automatically). Read it and extract all Atom names already present
    in `mapped_initial_access_atoms` and `mapped_post_exploitation_goal_atoms`.

    STEP 5 — Add any missing Atoms.
    For each Atom `id` you found in Step 3 that does NOT appear in the current
    MappedRequest, create a new MappedAtom:
      - `name`: the Atom id exactly as returned by the tool
      - `context`: why this atom is needed (reference the original requirement string)
      - `parameters`: a dict populated from the Atom's `required_vars` (read from
        the returned markdown) and any specific values from the user's request

    Add it to `mapped_initial_access_atoms` if it relates to an initial access
    vector, or `mapped_post_exploitation_goal_atoms` if it relates to a
    post-exploitation goal.

    STEP 6 — Output the final MappedRequest.
    Return a MappedRequest that merges the original mapper's atoms with any you
    added. Keep the original `section` value. If no atoms were missing, return
    the MappedRequest unchanged.

    CRITICAL JSON RULE: The entire output must be a single valid JSON object.
    For any atom whose `required_vars` is empty, set `"parameters": {}`.
    Do NOT append any text, backticks, or comments after the closing `}` of a
    parameters value. Any trailing characters will break JSON parsing.

    You MUST call `search_vulnerability_atoms` for every atomized description.
    Never skip a search or invent Atom names.
  expected_output: >
    A structured MappedRequest JSON object with `section`,
    `mapped_initial_access_atoms`, and `mapped_post_exploitation_goal_atoms`.
    This is either identical to the input MappedRequest (if complete) or extended
    with any Atoms the original mapper missed. Each MappedAtom has `name`,
    `context`, and `parameters`.
  agent: mapping_validator_agent

enumerate_dependencies_task:
  description: >
    You have been given a validated MappedRequest as context from the previous
    task. Your job is to identify all OS-level packages implicitly required by
    the scenario and add a `install_package` atom for each one not already present.

    STEP 1 — Read all atoms.
    List every atom in `mapped_initial_access_atoms` and
    `mapped_post_exploitation_goal_atoms`, including their `name`, `context`,
    and `parameters`.

    STEP 2 — Identify required packages.
    For each atom, reason about what Ubuntu/Debian packages it needs at runtime:
      - `samba_insecure_share`            → samba
      - `sensitive_file` with a .zip path → zip
      - `set_suid` on a non-base binary   → that binary's apt package
        (e.g. binary_path "/usr/bin/vim" → package "vim",
               binary_path "/usr/bin/find" → already in base, skip)
      - Any atom whose `context` mentions SSH as the access method,
        OR any scenario where a `create_user` atom is present and the overall
        context implies SSH login                                → openssh-server

    Also read the `section` field and all atom `context` strings for any service
    or tool names that imply additional packages not covered above.

    STEP 3 — Deduplicate and diff.
    Build a flat list of all required package names. Remove any for which an
    `install_package` atom already exists in `mapped_initial_access_atoms`
    with matching `parameters.package_name`.

    STEP 4 — Confirm atom format via RAG.
    For each missing package, call:
      Action: search_vulnerability_atoms
      Action Input: {"query": "install package <package_name>", "n_results": 1}
    Read the returned atom to confirm the `id` is `install_package` and note
    its `required_vars`. This grounds your output in real atom data.

    STEP 5 — Build and add the new MappedAtoms.
    For each missing package, create:
      - `name`: "install_package"
      - `context`: "<package_name> is required by <atom_name> to function at runtime"
      - `parameters`: {"package_name": "<package_name>"}
    Append each to `mapped_initial_access_atoms`.

    STEP 6 — Return the updated MappedRequest.
    Output a MappedRequest identical to the input except for the newly appended
    install_package atoms. Keep `section` and all existing atoms unchanged.

    You MUST call `search_vulnerability_atoms` for each missing package.
    Never skip the tool or invent atom names.
  expected_output: >
    A MappedRequest JSON object identical to the input except that
    `mapped_initial_access_atoms` now includes one `install_package` MappedAtom
    per implicitly required package that was not already present.
    Each new atom has `name`: "install_package", a clear `context`, and
    `parameters`: {"package_name": "<package>"}.
  agent: dependency_enumeration_agent

sequence_atoms_task:
  description: >
    You have been given a validated MappedRequest as context from the previous
    task. It contains two lists of MappedAtom objects:
      - `mapped_initial_access_atoms`: atoms needed to establish initial access.
      - `mapped_post_exploitation_goal_atoms`: atoms needed for post-exploitation.

    YOUR TASK: Produce a single, flat, correctly ordered list of ALL these atoms
    combined, so that a deployment script executed top-to-bottom will succeed.

    Think through these steps internally before producing your output:
    1. List every atom's `name` and `parameters` from both lists.
    2. Reason about dependencies — what each atom needs to exist before it runs,
       and which other atoms provide those prerequisites.
    3. Apply these ordering rules:
       a. `install_package` atoms always run first.
       b. `create_user` runs before any atom whose parameters reference that username.
       c. `samba_insecure_share` runs before `sensitive_file` if the file_path
          is inside the share's path (the share creates the directory).
       d. All `mapped_initial_access_atoms` run before all
          `mapped_post_exploitation_goal_atoms`.
       e. Within a group, preserve original order unless a dependency rule overrides.

    CRITICAL OUTPUT RULE: Your ENTIRE response must be a single valid JSON object
    and NOTHING ELSE. No markdown, no headers, no reasoning text, no numbered lists,
    no backticks, no explanations. Do all reasoning internally.
    The JSON object must be a SequencedRequest with a single `atoms` field: a list
    of MappedAtom objects in the determined execution order. Each MappedAtom must
    include its original `name`, `context`, and `parameters` unchanged.
  expected_output: >
    A single SequencedRequest JSON object — no surrounding text or markdown.
    It has one `atoms` field containing all MappedAtom objects in correct
    dependency-resolved execution order. Each atom retains its original
    `name`, `context`, and `parameters`.
  agent: sequencing_agent

generate_snippets_task:
  description: >
    Generate a Bash code snippet and a testing snippet for every Atom in the
    following sequenced atom list:

    {sequenced_atoms_json}

    Each entry in the list is a JSON object with:
      - `name`: the atom id (e.g. "samba_insecure_share")
      - `context`: why this atom was chosen
      - `parameters`: a dict of values to substitute (may be null if none needed)

    YOUR INSTRUCTIONS (follow in order for EACH atom):

    STEP 1 — Read the atom definition.
    Call `read_atom` with the atom's `name`.
    Example:
      Action: read_atom
      Action Input: {{"atom_name": "samba_insecure_share"}}

    STEP 2 — Reason about the security intent.
    Read the atom's `context` field (from the JSON entry). This is the mapper's
    explanation of WHY this atom was chosen and WHAT security flaw it should
    introduce. Use it to resolve any ambiguity the atom template leaves open:
      - The atom defines the SHAPE of the script; the context defines the INTENT.
      - If the context says "weak credential for SSH lateral movement", make the
        password obviously guessable (e.g. same as the username, or from a
        common wordlist like `rockyou`).
      - If the context implies an insider-threat or sloppy-developer scenario,
        the sensitive file should look plausible (e.g. a backed-up SSH private key
        or a credentials.txt with real-looking entries).
      - If the context names a specific binary, service, or path, use that
        even if the atom's `parameters` dict left it null.
      - When the context and `parameters` agree, `parameters` takes precedence
        for any value it explicitly supplies. For everything else, let context guide you.

    STEP 3 — Generate the code_snippet.
    Using the atom's Logic Requirements, Synthesis Guidance, your context
    reasoning from STEP 2, and the substituted parameters:
      - Write the Bash commands that implement the configuration/vulnerability.
      - Substitute all placeholders with values from `parameters` (or context-
        derived defaults where parameters are null).
      - Ensure that generated usernames, share names, file paths, and credential values are realistic and fit the scenario. Avoid obviously fake values like "password123" or "user1" unless the context implies a very weak credential. Use the get_rockyou_password() tool for weak passwords when appropriate. For file paths, use plausible locations (e.g. /srv/share for samba, or /home/<username>/backup.zip for a sensitive file in a user's home).
      - Do NOT include a shebang line (#!/bin/bash). That is added automatically.
      - Add a brief inline comment above each logical block explaining the
        security rationale (e.g. `# world-readable share for anonymous enumeration`).

    STEP 4 — Generate the testing_snippet.
    Using the atom's Testing Guidance:
      - Write a minimal Bash one-liner or short block that verifies the security
        state was achieved (e.g. confirms the SUID bit is set, the share is
        browseable, the file is readable by the intended user).
      - Do NOT include a shebang line.

    STEP 5 — Generate the attack_snippet (or null).
    Determine whether this atom has an EXTERNAL ATTACK SURFACE — meaning an
    attacker on a separate machine could probe or exploit it over the network.
      - If YES (e.g. samba_insecure_share, create_user with SSH context):
        Write a Bash command that probes the vulnerability from an attacker's
        perspective. The attacker container is Kali-based and addresses the
        target by hostname `target` on a Docker bridge network.

        AVAILABLE TOOLS on the attacker container (pre-installed):
          bash, curl, wget, nmap, hydra, smbclient, sshpass, openssh-client,
          netcat-traditional, ncat, metasploit-framework,
          redis-cli (from redis-tools), psql (from postgresql-client),
          mysql (from default-mysql-client), mongosh,
          ftp, dig/nslookup (from dnsutils), nikto, enum4linux

        Prefer tools from this list in your attack_snippet. Any tool NOT in
        this list will be dynamically installed at test time, but using a
        listed tool avoids delays. For HTTP-based probes, prefer curl.

        Examples:
          - samba_insecure_share:       `smbclient -L //target/<share_name> -N`
          - create_user with SSH:       `sshpass -p '<password>' ssh -o StrictHostKeyChecking=no <username>@target id`
          - redis_disable_auth:         `redis-cli -h target ping && redis-cli -h target keys '*'`
          - postgres_rce:               `PGPASSWORD='' psql -U <db_user> -h target -c '\du'`
          - database_expose (MySQL):    `mysql -h target -u root --password= -e 'show databases;'`
          - mongodb_disable_auth:       `mongosh --host target --eval "db.adminCommand('listDatabases')"`
          - ftp_anon_upload:            `curl -T /etc/hostname ftp://target/<upload_dir>/test.txt --user anonymous:`
        Do NOT include a shebang line.
      - If NO (e.g. install_package, set_suid, sensitive_file with no network
        exposure): set attack_snippet to null.
        These atoms only affect local state and are fully covered by Layer 1.

    STEP 6 — Build the GeneratedSnippet.
    For this atom, create a GeneratedSnippet with:
      - `atom_name`: the atom's `name`
      - `code_snippet`: your generated Bash commands (string)
      - `testing_snippet`: your verification commands (string)
      - `attack_snippet`: your attack probe command (string or null)
      - `mapped_atom`: the full MappedAtom object (name, context, parameters)
      - `validated`: false

    Repeat STEPS 1-6 for every atom in the list.
    Collect all GeneratedSnippet objects into a GeneratedSnippets wrapper.

    IMPORTANT:
    - You MUST call `read_atom` for every single atom. No exceptions.
    - The atom markdown is a scaffold. The `context` field is your brief for
      security intent — use it to make decisions the template leaves open.
    - Process atoms in the order given; do not reorder them.
    - Never merge multiple atoms' commands into one snippet.
    - For attack_snippet: only atoms with NETWORK-FACING services get one.
      Local-only atoms (install_package, set_suid, sensitive_file not exposed
      via a service) must have attack_snippet set to null.
  expected_output: >
    A GeneratedSnippets JSON object with a `snippets` field containing one
    GeneratedSnippet per atom, in the same order as the input list.
    Each GeneratedSnippet has: `atom_name` (str), `code_snippet` (str),
    `testing_snippet` (str), `attack_snippet` (str or null),
    `mapped_atom` (MappedAtom object), `validated` (false).
  agent: snippet_generation_agent

validate_snippets_task:
  description: >
    You are judging the output of a command that was executed inside a Docker
    container as part of vulnerability snippet testing.

    CONTEXT:
    - Atom: {atom_name}
    - Security intent: {atom_context}
    - Test layer: {layer}
    - Command executed: {snippet_executed}

    RAW OUTPUT:
    - Exit code: {exit_code}
    - STDOUT:
    {stdout}
    - STDERR:
    {stderr}

    YOUR TASK:
    Analyze the exit code, stdout, and stderr in the context of the atom's
    security intent and the command that was executed. Determine whether the
    output indicates the intended configuration or vulnerability was successfully
    applied (for Layer 1 internal state checks) or successfully exploited
    (for Layer 2 external attack probes).

    Consider:
    1. Does the exit code indicate success? (0 is usually good, but some tools
       return 0 on partial failure or non-zero on success with warnings.)
    2. Are there positive indicators in stdout? (Expected usernames, share names,
       file contents, permission bits, service status messages, etc.)
    3. Are there failure indicators in stderr? (Access denied, connection refused,
       authentication failed, etc. — but warnings and deprecation notices are
       NOT failures.)
    4. Is the output consistent with what the atom's security intent describes?

    Return a TestVerdict with:
    - `passed`: true if the evidence confirms success, false if it indicates failure.
    - `reasoning`: 1-3 sentences citing specific evidence from the output.
  expected_output: >
    A TestVerdict JSON object with `passed` (boolean) and `reasoning` (string
    citing specific evidence from stdout/stderr/exit_code).
  agent: testing_agent

diagnose_snippet_task:
  description: >
    A vulnerability snippet failed validation during Docker container testing.
    Diagnose the failure and produce a corrected version.

    FAILURE CONTEXT:
    - Atom: {atom_name}
    - Security intent: {atom_context}
    - Parameters: {atom_parameters}
    - Retry attempt: {attempt_number} of 2

    ORIGINAL SNIPPETS:
    - Code snippet that was applied:
    {original_code_snippet}

    - Testing snippet that was run:
    {original_testing_snippet}

    FAILURE EVIDENCE:
    - Stderr from applying code_snippet:
    {apply_stderr}

    - Testing snippet exit code: {l1_exit_code}
    - Testing snippet stdout:
    {l1_stdout}
    - Testing snippet stderr:
    {l1_stderr}

    - Testing Agent's verdict: {verdict_reasoning}

    YOUR TASK:
    1. Use `read_atom` to read the full atom definition for "{atom_name}" and
       understand the Logic Requirements, Synthesis Guidance, and Testing Guidance.
    2. Analyze all failure evidence — apply_stderr, l1 output, and verdict reasoning.
    3. Optionally use `exec_in_container` with container_id "goe_target" to run
       diagnostic commands and inspect the actual container state.
    4. Determine the root cause of the failure.
    5. Produce a complete, idempotent replacement for both code_snippet and
       testing_snippet that fixes the issue.

    Return a DiagnosticResult with:
    - `fixed_code_snippet`: The corrected Bash commands (no shebang).
    - `fixed_testing_snippet`: The corrected verification commands (no shebang).
    - `diagnosis`: 2-4 sentence explanation of root cause and fix.
    - `confidence`: "high", "medium", or "low".
  expected_output: >
    A DiagnosticResult JSON object with `fixed_code_snippet` (str),
    `fixed_testing_snippet` (str), `diagnosis` (str), and `confidence` (str).
  agent: diagnostic_agent
