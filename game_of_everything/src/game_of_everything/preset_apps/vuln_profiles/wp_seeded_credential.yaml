id: wp_seeded_credential
description: >
  A WordPress post contains credentials or sensitive data discoverable by an
  authenticated user. The post title, content wrapper, status, and credential
  format are all configurable via extra_vars — the synthesis agent decides the
  cover story.
compatible_presets:
  - wordpress
extra_required_vars:
  - seed_username
  - seed_password
extra_optional_vars:
  - post_title        # default: "Internal Notes"
  - post_status       # default: "private" (also: "draft", "publish")
  - post_content      # full post body — if set, used verbatim (must contain seed_username and seed_password)
vuln_config_snippet: |
  # Create a post containing the seeded credentials
  wp post create \
    --post_title="{{post_title}}" \
    --post_content="{{post_content}}" \
    --post_status="{{post_status}}" \
    --post_author=1 \
    --allow-root \
    --path=/var/www/html
testing_snippet_template: |
  # Verify a post exists containing the seeded credential
  FOUND=0
  for POST_ID in $(wp post list --post_status={{post_status}} --field=ID --allow-root --path=/var/www/html); do
    CONTENT=$(wp post get "$POST_ID" --field=post_content --allow-root --path=/var/www/html)
    if echo "$CONTENT" | grep -q "{{seed_username}}"; then
      echo "SEED_USER_FOUND in post $POST_ID"
      FOUND=1
      break
    fi
  done
  [ "$FOUND" = "1" ] || { echo "FAIL: No post found containing {{seed_username}}"; exit 1; }
  wp post get "$POST_ID" --field=post_content --allow-root --path=/var/www/html | grep -q "{{seed_password}}" && echo "SEED_PASS_FOUND"
attack_snippet_template: |
  source /tmp/harnesses/wp_helpers.sh
  wp_login "http://target:{{port}}" "{{admin_user}}" "{{admin_password}}" && echo "WP_LOGIN_SUCCESS"
  wp_find_in_posts "http://target:{{port}}" "{{seed_username}}" && echo "CREDENTIAL_FOUND"
